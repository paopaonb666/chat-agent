services:
  redis:
    image: valkey/valkey:8-alpine
    restart: unless-stopped
    volumes:
      - valkey-data:/data

  searxng:
    image: searxng/searxng:latest
    restart: unless-stopped
    ports:
      - "8080:8080"
    volumes:
      - ./searxng:/etc/searxng:rw
    environment:
      - SEARXNG_BASE_URL=http://localhost:8080/
    command: granian searx.asgi:application --host 0.0.0.0 --port 8080
    depends_on:
      - redis

volumes:
  valkey-data:
